<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Image Compressor & Resizer by SheeraZ</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #24292e;
            --accent-color: #2ea44f;
            --text-color: #333;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 24px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            display: none;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        input[type="number"] {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .checkbox-group {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
            margin-top: 5px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2c974b;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .preview-box h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #475569;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            object-fit: contain;
            background: #cbd5e1;
            display: block;
            margin: 0 auto;
        }

        .info {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }

        #status {
            margin-top: 15px;
            font-weight: 600;
            color: #0366d6;
        }

        #downloadBtn {
            background-color: #24292e;
        }
        #downloadBtn:hover {
            background-color: #1a1e22;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Image Resizer & 25KB Compressor</h1>
    <p style="color: #64748b; margin-top: -10px; font-size: 14px;">Set your target resolution and file size target simultaneously.</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p id="uploadPrompt">Drag & drop your image here or <strong>Browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls-grid">
        <div class="control-group">
            <label for="targetSize">Target Max (KB):</label>
            <input type="number" id="targetSize" value="25" min="5" max="5000">
        </div>
        <div class="control-group">
            <label for="targetWidth">Width (px):</label>
            <input type="number" id="targetWidth" value="600" min="10">
        </div>
        <div class="control-group">
            <label for="targetHeight">Height (px):</label>
            <input type="number" id="targetHeight" value="800" min="10">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="lockAspect" checked>
            <label for="lockAspect">Maintain Original Aspect Ratio</label>
        </div>
    </div>

    <button id="processBtn" disabled>Resize & Compress Image</button>

    <div id="status"></div>

    <div class="preview-container">
        <div class="preview-box">
            <h3>Original</h3>
            <div id="origPreview" style="color: #94a3b8; line-height: 100px;">—</div>
            <div class="info" id="origInfo"></div>
        </div>
        <div class="preview-box">
            <h3>Compressed</h3>
            <div id="compPreview" style="color: #94a3b8; line-height: 100px;">—</div>
            <div class="info" id="compInfo"></div>
        </div>
    </div>
    
    <div style="margin-top: 20px;">
        <button id="downloadBtn" style="display: none;">Download Processed Image</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const targetWidthInput = document.getElementById('targetWidth');
    const targetHeightInput = document.getElementById('targetHeight');
    const lockAspect = document.getElementById('lockAspect');
    
    let originalImage = null;
    let compressedBlob = null;
    let originalFileName = 'image';
    let originalAspectRatio = 1;

    // Drag and drop handlers
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-color)'; }, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--border-color)'; }, false);
    });
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        if (dt.files.length) { fileInput.files = dt.files; handleFile(dt.files[0]); }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    // Handle Linked Inputs for Aspect Ratio
    targetWidthInput.addEventListener('input', () => {
        if (lockAspect.checked && originalImage) {
            targetHeightInput.value = Math.round(parseInt(targetWidthInput.value) / originalAspectRatio) || '';
        }
    });

    targetHeightInput.addEventListener('input', () => {
        if (lockAspect.checked && originalImage) {
            targetWidthInput.value = Math.round(parseInt(targetHeightInput.value) * originalAspectRatio) || '';
        }
    });

    function handleFile(file) {
        originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        document.getElementById('uploadPrompt').innerText = `Selected: ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                originalAspectRatio = img.width / img.height;
                
                // If Aspect ratio lock is checked, adjust current default inputs to match aspect ratio base
                if (lockAspect.checked) {
                    targetHeightInput.value = Math.round(parseInt(targetWidthInput.value) / originalAspectRatio);
                }

                document.getElementById('origPreview').innerHTML = `<img src="${event.target.result}">`;
                document.getElementById('origInfo').innerText = `${img.width}x${img.height} | ${(file.size / 1024).toFixed(1)} KB`;
                processBtn.disabled = false;
                status.innerText = "Ready to scale and compress.";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    processBtn.addEventListener('click', async () => {
        if (!originalImage) return;
        
        const targetKB = parseFloat(document.getElementById('targetSize').value);
        const baseWidth = parseInt(targetWidthInput.value) || 600;
        const baseHeight = parseInt(targetHeightInput.value) || 800;

        status.innerText = "Crunching pixels to meet size requirements...";
        processBtn.disabled = true;

        try {
            compressedBlob = await smartCompress(originalImage, targetKB, baseWidth, baseHeight);
            
            const url = URL.createObjectURL(compressedBlob);
            
            // Get final dimensions from image to show accurately
            const finalImg = new Image();
            finalImg.onload = function() {
                document.getElementById('compPreview').innerHTML = `<img src="${url}">`;
                document.getElementById('compInfo').innerText = `${finalImg.width}x${finalImg.height} | ${(compressedBlob.size / 1024).toFixed(1)} KB`;
            }
            finalImg.src = url;
            
            status.innerText = `Success! Image optimized to ${(compressedBlob.size / 1024).toFixed(1)} KB`;
            downloadBtn.style.display = 'inline-block';
        } catch (err) {
            status.innerText = "Error during processing.";
            console.error(err);
        } finally {
            processBtn.disabled = false;
        }
    });

    async function smartCompress(img, targetKB, baseWidth, baseHeight) {
        const targetBytes = targetKB * 1024;
        let scale = 1.0;
        let bestBlob = null;
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // If the file is still too big at low JPEG qualities, the script automatically 
        // scales down step-by-step from your chosen baseline resolution to hit the target KB.
        while (scale > 0.05) {
            canvas.width = Math.round(baseWidth * scale);
            canvas.height = Math.round(baseHeight * scale);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw image matching custom chosen resolution bounding box
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            let low = 0.02;
            let high = 1.0;
            
            // Binary search to find highest possible JPEG quality variant
            for (let i = 0; i < 7; i++) {
                let quality = (low + high) / 2;
                let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
                
                if (blob.size <= targetBytes) {
                    bestBlob = blob;
                    low = quality; // Perfect, let's see if we can buy more quality
                } else {
                    high = quality; // Too heavy, drop the ceiling
                }
            }

            if (bestBlob) return bestBlob;

            // Size budget unmet; drop resolution target dynamically by 10% step increments
            scale -= 0.1;
        }

        return bestBlob || await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.01));
    }

    downloadBtn.addEventListener('click', () => {
        if (!compressedBlob) return;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(compressedBlob);
        link.download = `${originalFileName}_${targetWidthInput.value}x${targetHeightInput.value}.jpg`;
        link.click();
    });
</script>

</body>
</html>
