<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Image Compressor</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #24292e;
            --accent-color: #2ea44f;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .upload-zone {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2c974b;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            object-fit: contain;
            background: #eee;
        }

        .info {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
            color: #0366d6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Target Size Compressor by SheeraZ</h1>
    <p>Convert and compress any image down to your exact target size.</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p id="uploadPrompt">Drag & drop your image here or <strong>Browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls">
        <label for="targetSize">Target Size (KB):</label>
        <input type="number" id="targetSize" value="25" min="5" max="5000">
        <button id="processBtn" disabled>Compress Image</button>
    </div>

    <div id="status"></div>

    <div class="preview-container">
        <div class="preview-box">
            <h3>Original</h3>
            <div id="origPreview">—</div>
            <div class="info" id="origInfo"></div>
        </div>
        <div class="preview-box">
            <h3>Compressed</h3>
            <div id="compPreview">—</div>
            <div class="info" id="compInfo"></div>
        </div>
    </div>
    
    <div style="margin-top: 25px;">
        <button id="downloadBtn" style="display: none;">Download Compressed Image</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    
    let originalImage = null;
    let compressedBlob = null;
    let originalFileName = 'image';

    // Drag and drop handlers
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-color)'; }, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = '#cbd5e1'; }, false);
    });
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) { fileInput.files = files; handleFile(files[0]); }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        document.getElementById('uploadPrompt').innerText = `Selected: ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                document.getElementById('origPreview').innerHTML = `<img src="${event.target.result}">`;
                document.getElementById('origInfo').innerText = `${img.width}x${img.height} | ${(file.size / 1024).toFixed(1)} KB`;
                processBtn.disabled = false;
                status.innerText = "Ready to compress.";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    processBtn.addEventListener('click', async () => {
        if (!originalImage) return;
        
        const targetKB = parseFloat(document.getElementById('targetSize').value);
        status.innerText = "Processing... Finding the optimal crunch factor...";
        processBtn.disabled = true;

        try {
            compressedBlob = await smartCompress(originalImage, targetKB);
            
            const url = URL.createObjectURL(compressedBlob);
            document.getElementById('compPreview').innerHTML = `<img src="${url}">`;
            document.getElementById('compInfo').innerText = `Size: ${(compressedBlob.size / 1024).toFixed(1)} KB`;
            
            status.innerText = `Success! Target hit: ${(compressedBlob.size / 1024).toFixed(1)} KB`;
            downloadBtn.style.display = 'inline-block';
        } catch (err) {
            status.innerText = "Error during compression.";
            console.error(err);
        } finally {
            processBtn.disabled = false;
        }
    });

    async function smartCompress(img, targetKB) {
        const targetBytes = targetKB * 1024;
        let scale = 1.0;
        let bestBlob = null;
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Loop handles step-down scaling if adjusting quality alone isn't enough
        while (scale > 0.05) {
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // Binary search for the best JPEG quality setting (between 0.05 and 1.0)
            let low = 0.05;
            let high = 1.0;
            
            for (let i = 0; i < 7; i++) { // 7 steps provides plenty of precision
                let quality = (low + high) / 2;
                let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
                
                if (blob.size <= targetBytes) {
                    bestBlob = blob;
                    low = quality; // Try to get better visual quality while remaining under budget
                } else {
                    high = quality; // Too big! Lower the quality upper bound
                }
            }

            // If we managed to get a blob under our target size, return it!
            if (bestBlob) return bestBlob;

            // If we couldn't fit it under 25KB even at low quality, scale down dimensions by 10% and try again
            scale -= 0.1;
        }

        // Ultimate fallback: if it's a massive poster, return the absolute smallest thing we can output
        return bestBlob || await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.01));
    }

    downloadBtn.addEventListener('click', () => {
        if (!compressedBlob) return;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(compressedBlob);
        link.download = `${originalFileName}_compressed.jpg`;
        link.click();
    });
</script>

</body>
</html>
