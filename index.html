<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Optimizer with BG Removal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #24292e;
            --accent-color: #2ea44f;
            --text-color: #333;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 22px;
            margin-bottom: 5px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            display: none;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        input[type="number"] {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .checkbox-group {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
            margin-top: 5px;
        }
        
        .bg-checkbox {
            color: #0366d6;
            font-weight: 600;
            border: 1px solid #0366d6;
            background: #e6f1fd;
            padding: 8px;
            border-radius: 6px;
            margin-top: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
            position: relative;
        }

        button:hover {
            background-color: #2c974b;
        }

        button:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .preview-box h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #475569;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            object-fit: contain;
            background: #cbd5e1;
            display: block;
            margin: 0 auto;
        }

        .info {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }

        #status {
            margin-top: 15px;
            font-weight: 600;
            color: #0366d6;
        }

        #downloadBtn {
            background-color: #24292e;
        }
        #downloadBtn:hover {
            background-color: #1a1e22;
        }
        
        #loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2ea44f;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #globalCounter {
            color: #475569;
            font-weight: 600;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
            background: #edf7ed;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #c8e6c9;
        }
        #countNumber {
            color: var(--accent-color);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: #475569; margin-top: 15px;">Model Loading & Processing...</p>
    </div>

    <h1>Image Optimizer & Background Remover</h1>
    
    <div id="globalCounter">
        ⚡ Helped people optimize <span id="countNumber">...</span> pictures!
    </div>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p id="uploadPrompt">Drag & drop your image here or <strong>Browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls-grid">
        <div class="control-group">
            <label for="targetSize">Target Max (KB):</label>
            <input type="number" id="targetSize" value="25" min="5" max="5000">
        </div>
        <div class="control-group">
            <label for="targetWidth">Width (px):</label>
            <input type="number" id="targetWidth" value="600" min="10">
        </div>
        <div class="control-group">
            <label for="targetHeight">Height (px):</label>
            <input type="number" id="targetHeight" value="800" min="10">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="lockAspect">
            <label for="lockAspect">Maintain Original Aspect Ratio</label>
        </div>
        <div class="checkbox-group bg-checkbox">
            <input type="checkbox" id="removeBg" checked>
            <label for="removeBg" style="color: #0366d6;">Remove Background (Set White)</label>
        </div>
    </div>

    <button id="processBtn" disabled>Process Image</button>

    <div id="status"></div>

    <div class="preview-container">
        <div class="preview-box">
            <h3>Original</h3>
            <div id="origPreview" style="color: #94a3b8; line-height: 100px;">—</div>
            <div class="info" id="origInfo"></div>
        </div>
        <div class="preview-box">
            <h3>Processed</h3>
            <div id="compPreview" style="color: #94a3b8; line-height: 100px;">—</div>
            <div class="info" id="compInfo"></div>
        </div>
    </div>
    
    <div style="margin-top: 20px;">
        <button id="downloadBtn" style="display: none;">Download Processed Image</button>
    </div>
</div>

<script>
    // Supabase Configuration
    const supabaseUrl = 'https://hvxzjpxjnussldgdrkma.supabase.co/rest/v1/app_stats';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2eHpqcHhqbnVzc2xkZ2Rya21hIiwicm9sZSI6Imh2eHpqcHhqbnVzc2xkZ2Rya21hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MjMxMzgsImV4cCI6MjA5NjM5OTEzOH0._pw1IyV-pg_jEcV5Hw0pcfShb-L21HZq1xDZ2pXpPXs';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const targetWidthInput = document.getElementById('targetWidth');
    const targetHeightInput = document.getElementById('targetHeight');
    const lockAspect = document.getElementById('lockAspect');
    const removeBgCheckbox = document.getElementById('removeBg');
    
    let originalImage = null;
    let originalFile = null;
    let processedBlob = null;
    let originalFileName = 'image';
    let originalAspectRatio = 1;
    let segmentationModel = null;

    // Fetch the total conversion count from database
    async function loadGlobalCount() {
        try {
            const { data, error } = await _supabase
                .from('app_stats')
                .select('total_conversions')
                .eq('id', 1)
                .single();
                
            if (data) {
                document.getElementById('countNumber').innerText = data.total_conversions.toLocaleString();
            }
        } catch (err) {
            console.error("Error loading stats:", err);
        }
    }
    loadGlobalCount();

    // Loading TensorFlow body segmentation models
    async function loadModel() {
        try {
            const model = bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation;
            const segmenterConfig = {
                runtime: 'mediapipe', 
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
            };
            segmentationModel = await bodySegmentation.createSegmenter(model, segmenterConfig);
            status.innerText = "Processing tools loaded. Ready for your image.";
        } catch (error) {
            console.error("Failed to load TensorFlow model", error);
            status.innerText = "Warning: Machine learning model failed to load. Background removal will not work.";
        }
    }
    loadModel();

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-color)'; }, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--border-color)'; }, false);
    });
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        if (dt.files.length) { fileInput.files = dt.files; handleFile(dt.files[0]); }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    targetWidthInput.addEventListener('input', () => {
        if (lockAspect.checked && originalImage) {
            targetHeightInput.value = Math.round(parseInt(targetWidthInput.value) / originalAspectRatio) || '';
        }
    });

    targetHeightInput.addEventListener('input', () => {
        if (lockAspect.checked && originalImage) {
            targetWidthInput.value = Math.round(parseInt(targetHeightInput.value) * originalAspectRatio) || '';
        }
    });

    function handleFile(file) {
        originalFile = file;
        originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        document.getElementById('uploadPrompt').innerText = `Selected: ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                originalAspectRatio = img.width / img.height;
                
                if (lockAspect.checked) {
                    targetHeightInput.value = Math.round(parseInt(targetWidthInput.value) / originalAspectRatio);
                }

                document.getElementById('origPreview').innerHTML = `<img src="${event.target.result}">`;
                document.getElementById('origInfo').innerText = `${img.width}x${img.height} | ${(file.size / 1024).toFixed(1)} KB`;
                processBtn.disabled = false;
                status.innerText = "Ready to process.";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    processBtn.addEventListener('click', async () => {
        if (!originalImage || !originalFile) return;
        
        const targetKB = parseFloat(document.getElementById('targetSize').value);
        const finalWidth = parseInt(targetWidthInput.value) || 600;
        const finalHeight = parseInt(targetHeightInput.value) || 800;
        const removeBg = removeBgCheckbox.checked;

        loader.style.display = 'flex'; 
        status.innerText = "Processing complexity... Machine learning may take a few seconds...";
        processBtn.disabled = true;

        try {
            let inputSource = originalImage;
            if (removeBg && segmentationModel) {
                inputSource = await processRemoveBackground(originalImage);
            }

            const mainCanvas = document.createElement('canvas');
            mainCanvas.width = finalWidth;
            mainCanvas.height = finalHeight;
            const mainCtx = mainCanvas.getContext('2d');
            
            mainCtx.fillStyle = "#FFFFFF";
            mainCtx.fillRect(0, 0, finalWidth, finalHeight);
            mainCtx.drawImage(inputSource, 0, 0, finalWidth, finalHeight);

            processedBlob = await iterativeQualityCompression(mainCanvas, targetKB);
            
            const url = URL.createObjectURL(processedBlob);
            
            const finalImg = new Image();
            finalImg.onload = function() {
                document.getElementById('compPreview').innerHTML = `<img src="${url}">`;
                document.getElementById('compInfo').innerText = `${finalImg.width}x${finalImg.height} | ${(processedBlob.size / 1024).toFixed(1)} KB`;
            }
            finalImg.src = url;
            
            status.innerText = `Success! Optimized to ${(processedBlob.size / 1024).toFixed(1)} KB`;
            downloadBtn.style.display = 'inline-block';

            // Safely report back to Supabase to hit the increment function
            try {
                await _supabase.rpc('increment_conversions');
                await loadGlobalCount(); 
            } catch (dbErr) {
                console.error("Could not increment remote counter", dbErr);
            }

        } catch (err) {
            status.innerText = "Error during processing.";
            console.error(err);
        } finally {
            loader.style.display = 'none'; 
            processBtn.disabled = false;
        }
    });

    async function processRemoveBackground(img) {
        const people = await segmentationModel.segmentPeople(img);
        
        const foregroundColor = {r: 0, g: 0, b: 0, a: 0}; 
        const backgroundColor = {r: 255, g: 255, b: 255, a: 255}; 
        
        const mask = await bodySegmentation.toBinaryMask(people, foregroundColor, backgroundColor);

        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;

        await bodySegmentation.drawMask(canvas, img, mask, 1.0, 2);

        return canvas; 
    }

    async function iterativeQualityCompression(canvas, targetKB) {
        const targetBytes = targetKB * 1024;
        let bestBlob = null;
        
        let low = 0.01;
        let high = 1.0;
        
        for (let i = 0; i < 7; i++) {
            let quality = (low + high) / 2;
            let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
            
            if (blob.size <= targetBytes) {
                bestBlob = blob;
                low = quality; 
            } else {
                high = quality; 
            }
        }

        return bestBlob || await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.01));
    }

    downloadBtn.addEventListener('click', () => {
        if (!processedBlob) return;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(processedBlob);
        link.download = `${originalFileName}_${targetWidthInput.value}x${targetHeightInput.value}.jpg`;
        link.click();
    });
</script>

</body>
</html>
